<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Endless 2D Car Survival</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #2c3e50;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        canvas {
            background-color: #34495e;
            border: 4px solid #ecf0f1;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        #instructions {
            margin-top: 15px;
            text-align: center;
        }
    </style>
</head>
<body>

    <h2>🚗 Survive the Road! 👾</h2>
    <canvas id="gameCanvas" width="400" height="600"></canvas>
    <div id="instructions">
        <p>Use <strong>Left & Right Arrow Keys</strong> to steer.</p>
        <p>Avoid <span style="color: #95a5a6;">Gray Obstacles</span> and <span style="color: #e74c3c;">Red Monsters</span>!</p>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        // Game Variables
        let isGameOver = false;
        let distance = 0;
        let frameCount = 0;
        let gameSpeed = 3;

        // Player (Car)
        const car = {
            x: 175,
            y: 500,
            width: 40,
            height: 70,
            speed: 5,
            health: 100,
            dx: 0
        };

        // Arrays for enemies and obstacles
        let obstacles = [];
        let monsters = [];

        // Input Handling
        document.addEventListener("keydown", (e) => {
            if (e.code === "ArrowLeft") car.dx = -car.speed;
            if (e.code === "ArrowRight") car.dx = car.speed;
            // Restart game if over
            if (e.code === "Space" && isGameOver) resetGame();
        });

        document.addEventListener("keyup", (e) => {
            if (e.code === "ArrowLeft" || e.code === "ArrowRight") car.dx = 0;
        });

        // Functions to spawn entities
        function spawnObstacle() {
            let width = Math.random() * 40 + 30;
            let x = Math.random() * (canvas.width - width);
            obstacles.push({ x: x, y: -50, width: width, height: 40 });
        }

        function spawnMonster() {
            let width = 30;
            let x = Math.random() * (canvas.width - width);
            // Monsters move slightly left or right as they come down
            let mx = (Math.random() - 0.5) * 2; 
            monsters.push({ x: x, y: -40, width: width, height: 40, mx: mx });
        }

        // Collision Detection
        function checkCollision(rect1, rect2) {
            return (
                rect1.x < rect2.x + rect2.width &&
                rect1.x + rect1.width > rect2.x &&
                rect1.y < rect2.y + rect2.height &&
                rect1.y + rect1.height > rect2.y
            );
        }

        // Reset Game
        function resetGame() {
            car.health = 100;
            car.x = 175;
            distance = 0;
            gameSpeed = 3;
            obstacles = [];
            monsters = [];
            isGameOver = false;
            gameLoop();
        }

        // Update Game Logic
        function update() {
            if (isGameOver) return;

            // Move car
            car.x += car.dx;

            // Keep car in bounds
            if (car.x < 0) car.x = 0;
            if (car.x + car.width > canvas.width) car.x = canvas.width - car.width;

            // Update distance and difficulty
            distance += gameSpeed / 10;
            frameCount++;
            if (frameCount % 600 === 0) gameSpeed += 0.5; // Speed up over time

            // Spawn Obstacles (every 60 frames)
            if (frameCount % 80 === 0) spawnObstacle();
            
            // Spawn Monsters (every 120 frames)
            if (frameCount % 150 === 0) spawnMonster();

            // Move and check Obstacles
            for (let i = 0; i < obstacles.length; i++) {
                let obs = obstacles[i];
                obs.y += gameSpeed;

                if (checkCollision(car, obs)) {
                    car.health -= 20; // Take damage
                    obstacles.splice(i, 1);
                    i--;
                } else if (obs.y > canvas.height) {
                    obstacles.splice(i, 1);
                    i--;
                }
            }

            // Move and check Monsters
            for (let i = 0; i < monsters.length; i++) {
                let mon = monsters[i];
                mon.y += gameSpeed * 1.2; // Monsters move slightly faster
                mon.x += mon.mx; // Monsters wiggle

                // Keep monsters in bounds
                if (mon.x < 0 || mon.x + mon.width > canvas.width) mon.mx *= -1; 

                if (checkCollision(car, mon)) {
                    car.health -= 35; // Monsters do more damage
                    monsters.splice(i, 1);
                    i--;
                } else if (mon.y > canvas.height) {
                    monsters.splice(i, 1);
                    i--;
                }
            }

            // Check Game Over
            if (car.health <= 0) {
                isGameOver = true;
            }
        }

        // Draw Everything
        function draw() {
            // Clear Canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw Road Lines (Scrolling effect)
            ctx.fillStyle = "rgba(255, 255, 255, 0.5)";
            for (let i = 0; i < canvas.height; i += 40) {
                let offset = (frameCount * gameSpeed) % 40;
                ctx.fillRect(canvas.width / 2 - 5, i - offset, 10, 20);
            }

            // Draw Car
            ctx.fillStyle = "#3498db"; // Blue car
            ctx.fillRect(car.x, car.y, car.width, car.height);
            // Draw car windows
            ctx.fillStyle = "#ecf0f1";
            ctx.fillRect(car.x + 5, car.y + 10, car.width - 10, 15);
            ctx.fillRect(car.x + 5, car.y + 45, car.width - 10, 15);

            // Draw Obstacles
            ctx.fillStyle = "#95a5a6"; // Gray blocks
            obstacles.forEach(obs => {
                ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
            });

            // Draw Monsters
            ctx.fillStyle = "#e74c3c"; // Red monsters
            monsters.forEach(mon => {
                ctx.beginPath();
                ctx.arc(mon.x + mon.width/2, mon.y + mon.height/2, mon.width/2, 0, Math.PI * 2);
                ctx.fill();
                // Monster Eyes
                ctx.fillStyle = "yellow";
                ctx.fillRect(mon.x + 5, mon.y + 10, 5, 5);
                ctx.fillRect(mon.x + 20, mon.y + 10, 5, 5);
                ctx.fillStyle = "#e74c3c"; // Reset to red
            });

            // Draw UI (Health and Score)
            ctx.fillStyle = "white";
            ctx.font = "20px Arial";
            ctx.fillText(`Distance: ${Math.floor(distance)}m`, 10, 30);
            
            ctx.fillStyle = car.health > 30 ? "#2ecc71" : "#e74c3c";
            ctx.fillText(`Health: ${car.health}%`, canvas.width - 120, 30);

            // Draw Game Over Screen
            if (isGameOver) {
                ctx.fillStyle = "rgba(0, 0, 0, 0.7)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "white";
                ctx.font = "40px Arial";
                ctx.textAlign = "center";
                ctx.fillText("CRASHED!", canvas.width / 2, canvas.height / 2 - 20);
                ctx.font = "20px Arial";
                ctx.fillText(`Final Distance: ${Math.floor(distance)}m`, canvas.width / 2, canvas.height / 2 + 20);
                ctx.fillText("Press SPACE to Restart", canvas.width / 2, canvas.height / 2 + 60);
                ctx.textAlign = "left"; // Reset alignment
            }
        }

        // Main Game Loop
        function gameLoop() {
            update();
            draw();
            if (!isGameOver) {
                requestAnimationFrame(gameLoop);
            }
        }

        // Start Game
        gameLoop();
    </script>
</body>
</html>
